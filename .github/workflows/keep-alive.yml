name: Keep Repository Active

on:
  schedule:
    - cron: '0 8 * * *'  # 每天早上 8 点 (UTC+8 = 0:00 UTC)
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update timestamp
        run: |
          date > data/last-activity.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/last-activity.txt
          git commit -m "chore: daily activity $(date +'%Y-%m-%d')"
          git push
